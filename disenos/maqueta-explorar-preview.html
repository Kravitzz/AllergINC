<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maqueta · Explorar (emergente)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<style>
  :root{
    --bg:#0e0e10; --card:#1a1a1c; --surface:#2a2a2e;
    --text:#f1f0ec; --muted:#a6a5a0; --hint:#706f6b;
    --line:rgba(255,255,255,0.10);
    --info:#4a90d9; --star:#f0b429;
    --seguro:#46b56e; --prec:#f0a83a; --peligro:#e0524f; --sininfo:#8a8980;
    --grave:#e0524f; --medio:#f0a83a; --leve:#8fdcb8;
    --map:#15171b;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
  body{background:var(--bg); display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px;}
  .phone{width:100%; max-width:380px; background:var(--card); border:1px solid var(--line); border-radius:28px; overflow:hidden; display:flex; flex-direction:column; height:880px;}
  .statusbar{display:flex; justify-content:space-between; font-size:12px; color:var(--hint); padding:12px 18px 6px; flex-shrink:0; background:var(--card);}

  .maparea{flex:1; position:relative; overflow:hidden; background:var(--map);}
  .street{position:absolute; background:rgba(255,255,255,0.06);}
  .park{position:absolute; background:rgba(70,181,110,0.10); border-radius:14px;}
  .me{position:absolute; width:18px; height:18px; background:var(--info); border-radius:50%; border:3px solid var(--card); box-shadow:0 0 0 6px rgba(74,144,217,0.22);}
  .pin{position:absolute; width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; border:2px solid #0e0e10; box-shadow:0 2px 5px rgba(0,0,0,.5);}
  .pin i{transform:rotate(45deg); color:#10221f; font-size:14px;}
  .pin.seguro{background:var(--seguro);} .pin.prec{background:var(--prec);} .pin.peligro{background:var(--peligro);} .pin.sininfo{background:var(--sininfo);}
  /* pin seleccionado: más grande y con anillo */
  .pin.sel{width:40px; height:40px; z-index:3; box-shadow:0 0 0 4px rgba(255,255,255,.25), 0 3px 8px rgba(0,0,0,.6);}
  .pin.sel i{font-size:18px;}

  .topbar{position:absolute; top:10px; left:12px; right:12px; display:flex; gap:8px; align-items:center; z-index:4;}
  .rbtn{width:42px; height:42px; border-radius:12px; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--text); font-size:20px; flex-shrink:0;}
  .searchbar{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px; display:flex; align-items:center; gap:9px; color:var(--hint); font-size:13.5px;}

  /* Emergente (preview al tocar el pin) */
  .popup{position:absolute; left:16px; right:16px; bottom:18px; background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 10px 28px rgba(0,0,0,.55); z-index:6;}
  .popup .photos{display:flex; height:120px;}
  .popup .photos .ph{flex:1; display:flex; align-items:center; justify-content:center; color:#5a5a62; font-size:26px;}
  .ph.a{background:linear-gradient(135deg,#3a3030,#262022);} .ph.b{background:linear-gradient(135deg,#2f3630,#23271f);} .ph.c{background:linear-gradient(135deg,#322b38,#241f2a);}
  .popup .close{position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px;}
  .popup .body{padding:11px 14px 13px;}
  .pname-row{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .pname{font-size:16px; font-weight:700; color:var(--text);}
  .stars{display:flex; align-items:center; gap:5px; margin-top:4px; font-size:12px; color:var(--muted);}
  .stars .s{color:var(--star); font-size:14px; display:flex; gap:1px;}
  .meta{font-size:12px; color:var(--muted); margin-top:5px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .open{font-size:12px; margin-top:3px; color:var(--text);} .open b{color:var(--seguro);}
  .match{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:9px;}
  .match .lbl{font-size:11px; color:var(--hint);}
  .achip{font-size:10px; font-weight:600; padding:2px 7px; border-radius:999px;}
  .achip.grave{background:rgba(224,82,79,0.20); color:var(--grave);}
  .achip.plus{background:rgba(255,255,255,0.08); color:var(--muted);}
  .verd{font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; color:#10221f;}
  .verd.peligro{background:var(--peligro);}
  .actions{display:flex; gap:8px; align-items:center; margin-top:12px;}
  .circ{width:42px; height:42px; border-radius:50%; background:rgba(74,144,217,0.16); display:flex; align-items:center; justify-content:center; color:var(--info); font-size:19px; flex-shrink:0;}
  .more{flex:1; background:var(--info); color:#fff; border-radius:999px; padding:11px; text-align:center; font-weight:600; font-size:14px; display:flex; gap:7px; align-items:center; justify-content:center;}

  .nav{display:flex; border-top:1px solid var(--line); flex-shrink:0; padding:8px 4px 14px; background:var(--card);}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .navitem i{font-size:24px; color:var(--muted);}
  .navitem span{font-size:10.5px; color:var(--muted);}
  .navitem.active i, .navitem.active span{color:var(--info); font-weight:600;}
  .navitem .scanbox{width:54px; height:54px; border-radius:50%; background:var(--info); display:flex; align-items:center; justify-content:center; margin-top:-22px; border:4px solid var(--card); box-shadow:0 2px 6px rgba(0,0,0,.35);}
  .navitem .scanbox i{color:#fff; font-size:26px;}
</style>
</head>
<body>
<div class="phone">

  <div class="statusbar">
    <span>9:41</span>
    <span><i class="ti ti-wifi"></i> <i class="ti ti-battery-3"></i></span>
  </div>

  <div class="maparea">
    <div class="street" style="top:0; left:30%; width:6px; height:100%;"></div>
    <div class="street" style="top:0; left:66%; width:4px; height:100%; opacity:.7;"></div>
    <div class="street" style="top:30%; left:0; width:100%; height:6px;"></div>
    <div class="park" style="top:14%; left:68%; width:90px; height:60px;"></div>

    <div class="me" style="top:40%; left:46%;"></div>
    <div class="pin seguro" style="top:20%; left:56%;"><i class="ti ti-check"></i></div>
    <div class="pin prec" style="top:24%; left:22%;"><i class="ti ti-alert-triangle"></i></div>
    <!-- pin seleccionado -->
    <div class="pin peligro sel" style="top:34%; left:40%;"><i class="ti ti-x"></i></div>

    <div class="topbar">
      <div class="rbtn"><i class="ti ti-chevron-left"></i></div>
      <div class="searchbar"><i class="ti ti-search"></i> Buscar restaurante, comida o zona…</div>
    </div>

    <!-- Emergente -->
    <div class="popup">
      <div class="photos">
        <div class="ph a"><i class="ti ti-tools-kitchen-2"></i></div>
        <div class="ph b"><i class="ti ti-pizza"></i></div>
        <div class="ph c"><i class="ti ti-salad"></i></div>
      </div>
      <div class="close"><i class="ti ti-x"></i></div>
      <div class="body">
        <div class="pname-row">
          <div class="pname">Bella Italia</div>
          <span class="verd peligro">Peligro</span>
        </div>
        <div class="stars">
          <span class="s"><i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i><i class="ti ti-star-filled"></i><i class="ti ti-star-half-filled"></i><i class="ti ti-star"></i></span>
          3,5 (216) <i class="ti ti-info-circle" style="font-size:13px;"></i>
        </div>
        <div class="meta"><i class="ti ti-tools-kitchen-2" style="font-size:13px;"></i> Italiano · 10–20 € <i class="ti ti-wheelchair" style="font-size:13px;"></i></div>
        <div class="open"><b>Abierto</b> · Cierra a las 0:00</div>

        <div class="match">
          <span class="lbl">Tus alérgenos:</span>
          <span class="achip grave">Gluten</span>
          <span class="achip grave">Cacahuetes</span>
          <span class="achip plus">+2</span>
        </div>

        <div class="actions">
          <div class="circ"><i class="ti ti-directions"></i></div>
          <div class="circ"><i class="ti ti-bookmark"></i></div>
          <div class="more"><i class="ti ti-list-details"></i> Más detalles</div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="navitem active"><i class="ti ti-home"></i><span>Inicio</span></div>
    <div class="navitem"><i class="ti ti-user"></i><span>Perfil</span></div>
    <div class="navitem"><div class="scanbox"><i class="ti ti-scan"></i></div><span>Escanear</span></div>
    <div class="navitem"><i class="ti ti-calendar-month"></i><span>Calendario</span></div>
    <div class="navitem"><i class="ti ti-settings"></i><span>Ajustes</span></div>
  </div>

</div>
</body>
</html>
